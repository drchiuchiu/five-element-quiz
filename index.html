// Handle photo upload — crop to square to prevent distortion
function handlePhoto(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      // Crop to center square
      const s = Math.min(img.width, img.height);
      const sx = (img.width - s) / 2;
      const sy = (img.height - s) / 2;
      const c = document.createElement('canvas');
      const sz = 400; // output resolution
      c.width = sz; c.height = sz;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, sx, sy, s, s, 0, 0, sz, sz);
      petPhoto = c.toDataURL('image/jpeg', 0.85);
      const btn = document.getElementById('photo-btn');
      btn.classList.add('has-photo');
      btn.innerHTML = `<img src="${petPhoto}" alt="寵物照片">`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// Build watercolor ring SVG for photo frame
function wcRingSvg(c, size){
  const r = size/2;
  return `<svg class="wc-ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <defs>
      <radialGradient id="wcg-${size}" cx="50%" cy="50%" r="50%">
        <stop offset="60%" stop-color="${c}" stop-opacity="0"/>
        <stop offset="75%" stop-color="${c}" stop-opacity=".18"/>
        <stop offset="85%" stop-color="${c}" stop-opacity=".12"/>
        <stop offset="95%" stop-color="${c}" stop-opacity=".06"/>
        <stop offset="100%" stop-color="${c}" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <circle cx="${r}" cy="${r}" r="${r}" fill="url(#wcg-${size})"/>
    <circle cx="${r}" cy="${r}" r="${r-3}" fill="none" stroke="${c}" stroke-width="1.5" opacity=".15"/>
    <circle cx="${r}" cy="${r}" r="${r-6}" fill="none" stroke="${c}" stroke-width=".8" opacity=".08"/>
  </svg>`;
}

function tog(qi,oi){
  const a=ans[qi],x=a.indexOf(oi);
  x>=0?a.splice(x,1):a.push(oi);
  // Only update option states, don't rebuild card (prevents flicker)
  const opts=document.querySelectorAll('.opt');
  opts.forEach((el,i)=>{
    if(a.includes(i)){el.classList.add('on')}else{el.classList.remove('on')}
  });
  // Update next button disabled state
  const nb=document.getElementById('nb');
  if(nb) nb.disabled = a.length===0;
}
function next(){ cq<QS.length-1?(cq++,renderQ()):showResult() }

// ===== SCORING =====
function calc(){
  let s=[0,0,0,0,0];
  QS.forEach((q,i)=>(ans[i]||[]).forEach(oi=>q.opts[oi].s.forEach((v,j)=>{s[j]+=v})));
  return s;
}
function pcts(s){ const t=s.reduce((a,b)=>a+b,0)||1; return s.map(v=>Math.round(v/t*100)) }
function getType(p){
  const sorted=p.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v);
  const pr=sorted[0],se=sorted[1];
  if(pr.v-se.v<=5){
    const k=ELEMENTS[pr.i]+ELEMENTS[se.i];
    return{pi:pr.i,si:se.i,mix:true,label:`${ELEMENTS[pr.i]}${ELEMENTS[se.i]}型`,nick:MIX_NICKS[k]||EL_NICKS[pr.i]};
  }
  return{pi:pr.i,si:se.v>=20?se.i:null,mix:false,label:`${ELEMENTS[pr.i]}型`,nick:EL_NICKS[pr.i]};
}

      <div class="btn-row">
        <button class="btn bp" onclick="genShareCard()">分享結果</button>
        <button class="btn bs" onclick="restart()">再測一次</button>
      </div>
    </div>

    <!-- Share card overlay -->
    <div class="share-overlay hidden" id="share-overlay" onclick="closeShare(event)">
      <div class="share-modal">
        <div class="share-hint">長按圖片即可儲存到手機相簿<br>再分享到 IG Story / LINE</div>
        <div id="share-img-wrap"></div>
        <div class="btn-row" style="margin-top:12px;padding:0 10px">
          <button class="btn bp" onclick="doNativeShare()">分享給朋友</button>
          <button class="btn bs" onclick="closeShare()">關閉</button>
        </div>
      </div>
    </div>
  </div>`;

  setTimeout(()=>renderRadar(pc,pi),120);
  renderBars(pc);
}

// ===== CUSTOM PENTAGON RADAR WITH WATERCOLOR FILL =====
function drawPentagon(ctx, cx, cy, r, startAngle){
  const pts=[];
  for(let i=0;i<5;i++){
    const a = startAngle + (Math.PI*2/5)*i;
    pts.push({x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)});
  }
  return pts;
}

function renderRadar(pc, pi){
  const canvas = document.getElementById('radar');
  const dpr = window.devicePixelRatio||1;
  const size = 310;
  canvas.width = size*dpr;
  canvas.height = size*dpr;
  canvas.style.width = size+'px';
  canvas.style.height = size+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  _drawPentagonChart(ctx, size, pc, pi, false);
}

// Personality keywords for each element (short, for chart labels)
const EL_PERSONALITY = ['活躍 冒險','熱情 忠誠','平靜 耐心','獨立 有條理','謹慎 警覺'];
const EL_PERSONALITY_EN = ['Active','Passionate','Calm','Independent','Cautious'];

function _drawPentagonChart(ctx, size, pc, pi, mini){
  const cx=size/2, cy=size/2;
  const R = mini ? size*0.30 : size*0.30;
  const startAngle = -Math.PI/2; // 木 at top
  const maxVal = Math.max(...pc, 35);
  const labelDist = mini ? 22 : 38;

  const outerPts = drawPentagon(ctx,cx,cy,R,startAngle);

  // Data polygon vertices
  const dataPts=[];
  for(let i=0;i<5;i++){
    const a = startAngle + (Math.PI*2/5)*i;
    const ratio = pc[i]/maxVal;
    const r = R*Math.max(ratio, 0.08);
    dataPts.push({x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)});
  }

  // ===== SECTOR-BASED COLORING (like the Banana render) =====
  // Each triangle sector center→vertex[i]→vertex[i+1] gets its own element color
  // The color is blended from the two adjacent elements

  // Layer 1: Fill each sector of the OUTER pentagon with its element color (base tint)
  for(let i=0;i<5;i++){
    const ni=(i+1)%5;
    // Midpoint of the edge between vertex i and i+1
    const mx=(outerPts[i].x+outerPts[ni].x)/2;
    const my=(outerPts[i].y+outerPts[ni].y)/2;

    ctx.save();
    // Clip to this sector triangle: center → vertex i → vertex i+1
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(outerPts[i].x,outerPts[i].y);
    ctx.lineTo(outerPts[ni].x,outerPts[ni].y);
    ctx.closePath();
    ctx.clip();

    // Gradient from center outward toward vertex i — this sector's color
    const col = EL_COLORS[i];
    const grad = ctx.createRadialGradient(cx,cy,R*0.05, outerPts[i].x,outerPts[i].y, R*0.95);
    grad.addColorStop(0, col+hexAlpha(0.08));
    grad.addColorStop(0.3, col+hexAlpha(0.22));
    grad.addColorStop(0.6, col+hexAlpha(0.32));
    grad.addColorStop(0.85, col+hexAlpha(0.18));
    grad.addColorStop(1, col+hexAlpha(0.10));
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,size,size);

    // Second pass: adjacent element bleed near the shared edge
    const col2 = EL_COLORS[ni];
    const grad2 = ctx.createRadialGradient(cx,cy,R*0.05, outerPts[ni].x,outerPts[ni].y, R*0.95);
    grad2.addColorStop(0, col2+hexAlpha(0.05));
    grad2.addColorStop(0.3, col2+hexAlpha(0.12));
    grad2.addColorStop(0.65, col2+hexAlpha(0.18));
    grad2.addColorStop(0.9, col2+hexAlpha(0.10));
    grad2.addColorStop(1, col2+hexAlpha(0.05));
    ctx.fillStyle=grad2;
    ctx.fillRect(0,0,size,size);

    ctx.restore();
  }

  // Layer 2: Data polygon — each sector filled with its element color, intensity by score
  for(let i=0;i<5;i++){
    const ni=(i+1)%5;
    const intensity = pc[i]/maxVal;

    ctx.save();
    // Clip to data sector: center → dataPt[i] → dataPt[i+1]
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(dataPts[i].x,dataPts[i].y);
    ctx.lineTo(dataPts[ni].x,dataPts[ni].y);
    ctx.closePath();
    ctx.clip();

    const col = EL_COLORS[i];
    // Strong fill — proportional to score
    const baseA = 0.20 + intensity*0.45;
    const grad = ctx.createRadialGradient(cx,cy,0, dataPts[i].x,dataPts[i].y, R*0.9);
    grad.addColorStop(0, col+hexAlpha(baseA*0.3));
    grad.addColorStop(0.3, col+hexAlpha(baseA*0.9));
    grad.addColorStop(0.6, col+hexAlpha(baseA*0.7));
    grad.addColorStop(1, col+hexAlpha(baseA*0.3));
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,size,size);

    // Adjacent color bleed
    const col2 = EL_COLORS[ni];
    const int2 = pc[ni]/maxVal;
    const baseA2 = 0.10 + int2*0.25;
    const grad2 = ctx.createRadialGradient(cx,cy,0, dataPts[ni].x,dataPts[ni].y, R*0.8);
    grad2.addColorStop(0, col2+hexAlpha(baseA2*0.2));
    grad2.addColorStop(0.4, col2+hexAlpha(baseA2*0.6));
    grad2.addColorStop(0.8, col2+hexAlpha(baseA2*0.3));
    grad2.addColorStop(1, col2+'00');
    ctx.fillStyle=grad2;
    ctx.fillRect(0,0,size,size);

    ctx.restore();
  }

  // Grid pentagons (over the color fill, subtle)
  for(let lv=1;lv<=5;lv++){
    const r = R*(lv/5);
    const pts = drawPentagon(ctx,cx,cy,r,startAngle);
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<5;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath();
    ctx.strokeStyle = lv===5 ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.25)';
    ctx.lineWidth = lv===5 ? 1.2 : 0.6;
    ctx.stroke();
  }
  // Axis lines (white, over color)
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(outerPts[i].x,outerPts[i].y);
    ctx.strokeStyle='rgba(255,255,255,0.2)';
    ctx.lineWidth=0.6;
    ctx.stroke();
  }

  // Layer 3: Data polygon outline — multi-segment colored
  for(let i=0;i<5;i++){
    const ni=(i+1)%5;
    ctx.beginPath();
    ctx.moveTo(dataPts[i].x,dataPts[i].y);
    ctx.lineTo(dataPts[ni].x,dataPts[ni].y);
    ctx.strokeStyle=EL_COLORS[i]+'CC';
    ctx.lineWidth=1.8;
    ctx.stroke();
  }

  // Vertex dots
  for(let i=0;i<5;i++){
    ctx.beginPath();
    ctx.arc(dataPts[i].x,dataPts[i].y, mini?3.5:5.5, 0, Math.PI*2);
    ctx.fillStyle=EL_COLORS[i];
    ctx.fill();
    ctx.strokeStyle='#fff';
    ctx.lineWidth= mini?1.5:2.5;
    ctx.stroke();
  }

  // ---- LABELS with personality traits ----
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  for(let i=0;i<5;i++){
    const a=startAngle+(Math.PI*2/5)*i;
    const lx=cx+(R+labelDist)*Math.cos(a);
    const ly=cy+(R+labelDist)*Math.sin(a);

    // Element character — bold, colored
    ctx.font= mini ? '600 13px "Noto Sans TC"' : 'bold 18px "Noto Sans TC"';
    ctx.fillStyle=EL_COLORS[i];
    ctx.fillText(ELEMENTS[i], lx, ly-(mini?10:14));

    // Percentage
    ctx.font= mini ? '500 9px "Playfair Display"' : '500 13px "Playfair Display"';
    ctx.fillStyle='#6A5D4F';
    ctx.fillText(pc[i]+'%', lx, ly+(mini?1:0));

    if(!mini){
      // Personality trait (Chinese)
      ctx.font='300 10px "Noto Sans TC"';
      ctx.fillStyle='#8A7B6B';
      ctx.fillText(EL_PERSONALITY[i], lx, ly+14);
      // English personality keyword
      ctx.font='italic 300 9px "Playfair Display"';
      ctx.fillStyle='#B5A898';
      ctx.fillText(EL_PERSONALITY_EN[i], lx, ly+26);
    }
  }
}

// Helper: convert 0-1 alpha to 2-char hex
function hexAlpha(a){
  return Math.round(Math.min(1,Math.max(0,a))*255).toString(16).padStart(2,'0');
}

function renderBars(pc){
  const el=document.getElementById('pct-bars');
  const sorted=pc.map((p,i)=>({p,i})).sort((a,b)=>b.p-a.p);
  el.innerHTML=sorted.map(({p,i})=>`
    <div class="pct-row">
      <span class="pct-lbl" style="color:${EL_COLORS[i]}">
        <span class="el-icon" style="width:14px;height:14px">${EL_SVGS[EL_KEYS[i]]}</span>${ELEMENTS[i]}
      </span>
      <div class="pct-bg"><div class="pct-fill" style="width:${p}%;background:${EL_COLORS[i]}"></div></div>
      <span class="pct-val">${p}%</span>
    </div>`).join('');
}

// ===== SHARE CARD =====
let shareData = {};

  // Share card photo or fallback

    ? `<div class="sc-photo-frame">

    : `<div class="sc-avatar" style="background:${c}15;color:${c}">
        ${petSp==='cat'?ICON_CAT_LG:ICON_DOG_LG}
      </div>`;

  let tgs=[...TRAIT_TAGS[ELEMENTS[pi]].slice(0,3)];
  if(r.mix&&r.si!==null) tgs.push(TRAIT_TAGS[ELEMENTS[r.si]][0]);

  // Build share card HTML
  const wrap = document.getElementById('share-img-wrap');
  wrap.innerHTML = `
    <div class="share-card" id="share-card-el">
      <div class="sc-inner">
        <div class="sc-title">毛孩五行體質分析</div>
        <div class="sc-sub">Five Element Constitution Analysis</div>
        <div class="sc-brand">By Dr. Chiu Chiu</div>
        <div class="sc-divider"></div>
        ${scPhotoHtml}
        <div class="sc-name">${petName}</div>
        <div class="sc-result-label">分析結果</div>
        <div class="sc-badge" style="background:${c}15;color:${c}">
          <span class="el-icon" style="width:18px;height:18px;display:inline-block;vertical-align:middle">${EL_SVGS[ek]}</span>
          ${r.label}
        </div>
        <div class="sc-nick" style="color:${c}">${r.nick}</div>
        <div class="sc-chart-wrap"><canvas id="share-radar"></canvas></div>
        <div class="sc-tags">
          ${tgs.map(t=>`<span class="sc-tag" style="background:${c}12;color:${c}">${t}</span>`).join('')}
        </div>
        <div class="sc-divider"></div>
        <div class="sc-footer">
          <strong>想更深入了解牠的體質嗎？</strong><br>
          歡迎預約中獸醫體質諮詢<br>或加入社群一起討論 ${ICON_PAW}
        </div>
      </div>
    </div>
  `;

  document.getElementById('share-overlay').classList.remove('hidden');

  // Draw mini pentagon radar
  setTimeout(()=>{
    const miniCanvas = document.getElementById('share-radar');
    const dpr2 = window.devicePixelRatio||1;
    const mSize = 180;
    miniCanvas.width = mSize*dpr2;
    miniCanvas.height = mSize*dpr2;
    miniCanvas.style.width = mSize+'px';
    miniCanvas.style.height = mSize+'px';
    const mctx = miniCanvas.getContext('2d');
    mctx.scale(dpr2,dpr2);
    _drawPentagonChart(mctx, mSize, pc, pi, true);

    // After chart renders, convert to image
    setTimeout(()=>{
      const el = document.getElementById('share-card-el');
      html2canvas(el,{
        backgroundColor:'#FAF8F4',
        scale:2,
        useCORS:true,
        logging:false
      }).then(canvas=>{
        const img = canvas.toDataURL('image/png');
        shareData = {img, type:r.label, name:petName};
        // Replace card with image for easy save
        wrap.innerHTML = `<img src="${img}" class="share-img" alt="${petName} 五行體質分析結果">`;
      }).catch(()=>{
        // If html2canvas fails, keep the card as-is
      });
    }, 400);
  }, 100);
}

function closeShare(e){
  if(e && e.target !== e.currentTarget) return;
  document.getElementById('share-overlay').classList.add('hidden');
}

async function doNativeShare(){
  // 1. Try Web Share API with file (works on most modern mobile browsers)
  if(shareData.img && navigator.share){
    try{
      const resp = await fetch(shareData.img);
      const blob = await resp.blob();
      const file = new File([blob],`${shareData.name}_五行體質.png`,{type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({
          title:`${shareData.name} 的五行體質分析`,
          text:`${shareData.name} 是${shareData.type}！快來測測你家毛孩的五行體質 🐾`,
          files:[file]
        });
        return;
      }
    }catch(e){ if(e.name==='AbortError') return; }
    // 2. Try text-only share as fallback
    try{
      await navigator.share({
        title:`${shareData.name} 的五行體質分析`,
        text:`${shareData.name} 是${shareData.type}！快來測測你家毛孩的五行體質 🐾`
      });
      return;
    }catch(e){ if(e.name==='AbortError') return; }
  }
  // 3. Detect in-app browsers (LINE, FB, IG) that don't support download
  const isInApp = /Line|FBAN|FBAV|Instagram/i.test(navigator.userAgent||'');
  if(!isInApp && shareData.img){
    try{
      const a=document.createElement('a');
      a.href=shareData.img;
      a.download=`${petName}_五行體質分析.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      return;
    }catch(e){}
  }
  // 4. Final fallback: instruct user to long-press save
  alert('長按上方圖片即可儲存到手機相簿，\n再分享到 LINE 或 IG Story 唷！');
}

function restart(){
  document.getElementById('result-page').classList.add('hidden');
  document.getElementById('result-page').innerHTML='';
  document.getElementById('intro-page').classList.remove('hidden');
  cq=0;initAns();
  // Reset photo upload button
  petPhoto=null;
  const btn=document.getElementById('photo-btn');
  if(btn){btn.classList.remove('has-photo');btn.innerHTML='<span class="ph-icon">+</span><span class="ph-text">上傳</span>';}
  const inp=document.getElementById('photo-input');
  if(inp) inp.value='';
}
