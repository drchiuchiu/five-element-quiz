<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>毛孩體質觀察指南 | 拾貳寵動物醫院</title>
<meta name="description" content="12 個簡單問題，幫你觀察毛孩的體質傾向。拾貳寵動物醫院 — 中獸醫門診">

<!-- Fonts & Libs -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root {
  --bg: #F5F7F5;
  --text: #1A2E1A;
  --text-light: #4A5F4A;
  --text-muted: #8A9A8A;
  --btn: #7A8E76;
  --btn-hover: #637360;
  --card: rgba(255,255,252,0.72);
  --border: #E5DDD3;
  --shadow: rgba(74,61,51,0.04);
  --accent: #D2B168;
  /* Axis colors */
  --ax-vitality: #E8A84C;
  --ax-body: #7A9970;
  --ax-metabolism: #7A9DAB;
  --ax-accum: #9A7A9D;
  --cold: #7A9DAB;
  --hot: #BF7565;
  --warn: #C4883A;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
a,button,input,select{-webkit-tap-highlight-color:transparent}

/* BG blobs */
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(90px)}
.bb1{width:340px;height:340px;top:-100px;right:-80px;background:var(--ax-vitality);opacity:.08}
.bb2{width:280px;height:280px;bottom:5%;left:-100px;background:var(--ax-metabolism);opacity:.06}
.bb3{width:220px;height:220px;top:35%;right:-50px;background:var(--ax-body);opacity:.05}

/* Leaf SVG */
.leaf-r{position:fixed;top:20px;right:-5px;width:110px;opacity:.14;pointer-events:none;z-index:0}
.leaf-l{position:fixed;bottom:40px;left:-15px;width:90px;opacity:.09;pointer-events:none;z-index:0;transform:scaleX(-1) rotate(10deg)}

.container{max-width:420px;margin:0 auto;padding:16px 18px 50px;position:relative;z-index:1}
.footer{text-align:center;padding:30px 0 16px;font-size:10px;color:var(--text-muted);letter-spacing:1px;font-family:'Playfair Display',serif;font-style:italic}

/* Header */
.header{text-align:center;padding:26px 0 10px}
.header h1{font-size:22px;font-weight:900;letter-spacing:4px;color:var(--text);line-height:1.3}
.header .sub{font-family:'Playfair Display',serif;font-size:11.5px;color:var(--text-muted);margin-top:5px;letter-spacing:2.5px;font-style:italic}
.header .brand{font-family:'Playfair Display',serif;font-size:11px;color:var(--btn);margin-top:10px;letter-spacing:2px}
.h-line{width:36px;height:1px;background:var(--border);margin:12px auto 0}

/* Progress */
.progress-wrap{margin:14px 0 20px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-bottom:5px}
.progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s;background:var(--btn)}

/* Card */
.card{
  background:var(--card);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(229,221,211,.55);border-radius:22px;
  padding:26px 20px;box-shadow:0 6px 28px var(--shadow);animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.q-num{font-family:'Playfair Display',serif;font-size:13px;color:var(--text-muted);margin-bottom:5px}
.q-cat{display:inline-block;font-size:10px;padding:3px 12px;border-radius:10px;margin-bottom:14px;font-weight:500;letter-spacing:.5px}
.qc-e{background:#FDF3E0;color:#8A6A2A}
.qc-s{background:#E8F0E5;color:#4A7040}
.qc-m{background:#E3EEF2;color:#4A7A88}
.qc-l{background:#F0E8F2;color:#6A4A6D}
.qc-t{background:#FCE8E3;color:#8A4A3A}
.q-text{font-size:17px;font-weight:500;line-height:1.7;margin-bottom:6px}
.q-hint{font-size:12px;color:var(--text-muted);margin-bottom:16px;line-height:1.5}

/* Options */
.opts{display:flex;flex-direction:column;gap:7px}
.opt{
  display:flex;align-items:center;gap:11px;width:100%;padding:12px 15px;
  background:white;border:1.5px solid var(--border);border-radius:13px;
  font-size:14px;font-family:'Noto Sans TC',sans-serif;color:var(--text);
  cursor:pointer;transition:all .18s;text-align:left;line-height:1.45;
}
.opt:active{transform:scale(.98)}
.opt .ck{
  width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  background:white;transition:all .18s;
}
.opt:hover{border-color:var(--btn);background:rgba(122,142,118,.03)}
.opt.on{border-color:var(--btn);background:rgba(122,142,118,.06)}
.opt.on .ck{background:var(--btn);border-color:var(--btn)}
.opt.on .ck::after{content:'✓';color:#fff;font-size:12px;font-weight:600}

/* Buttons */
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{
  flex:1;padding:13px 0;border:none;border-radius:13px;
  font-size:14px;font-family:'Noto Sans TC',sans-serif;font-weight:500;
  cursor:pointer;transition:all .18s;letter-spacing:.5px;
}
.btn:active{transform:scale(.97)}
.bp{background:var(--btn);color:#fff}
.bp:hover{background:var(--btn-hover)}
.bp:disabled{opacity:.3;cursor:not-allowed}
.bs{background:#fff;color:var(--text);border:1.5px solid var(--border)}

/* Intro */
.intro{text-align:center;padding:20px 0 14px}
.intro p{font-size:14px;color:var(--text-light);line-height:1.9;margin-bottom:14px;font-weight:300}
.pet-section{margin:22px 0 6px;text-align:left}
.pet-section label{font-size:14px;font-weight:500;display:block;margin-bottom:7px}
.pet-in{
  flex:1;padding:12px 15px;border:1.5px solid var(--border);border-radius:13px;
  font-size:15px;font-family:'Noto Sans TC',sans-serif;background:#fff;
  color:var(--text);outline:none;transition:border-color .2s;width:100%;
}
.pet-in:focus{border-color:var(--btn)}
.sp-toggle{display:flex;gap:8px}
.sp-btn{
  flex:1;height:44px;border:1.5px solid var(--border);border-radius:12px;
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;
  transition:all .18s;font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:500;color:var(--text-light);
}
.sp-btn:hover{border-color:var(--btn)}
.sp-btn.active{border-color:var(--btn);background:rgba(122,142,118,.08);box-shadow:0 0 0 2px rgba(122,142,118,.12);color:var(--text);font-weight:600}
.age-toggle{display:flex;gap:6px;margin-top:7px}
.age-btn{
  flex:1;padding:10px 6px;border:1.5px solid var(--border);border-radius:12px;
  background:#fff;cursor:pointer;text-align:center;transition:all .18s;
  font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--text-light);
}
.age-btn.active{border-color:var(--btn);background:rgba(122,142,118,.08);color:var(--text);font-weight:600}
.size-toggle{display:flex;gap:5px;margin-top:7px}
.size-btn{
  flex:1;padding:8px 4px;border:1.5px solid var(--border);border-radius:12px;
  background:#fff;cursor:pointer;text-align:center;transition:all .18s;
  font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--text-light);
}
.size-btn.active{border-color:var(--btn);background:rgba(122,142,118,.08);color:var(--text);font-weight:600}
.trait-opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#fff;border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .18s}
.trait-opt:has(input:checked){border-color:var(--btn);background:rgba(122,142,118,.06)}
.trait-opt input[type="checkbox"]{margin-top:2px;accent-color:var(--btn);width:16px;height:16px;flex-shrink:0}
.trait-label{font-size:14px;font-weight:500;color:var(--text)}
.trait-hint{display:block;font-size:11px;color:var(--text-muted);margin-top:2px}

/* Tip blocks in results */
.tip-block{margin-top:12px;display:flex;flex-direction:column;gap:10px}
.tip-row{display:flex;gap:10px;font-size:13px;line-height:1.65;color:var(--text)}
.tip-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.tip-row strong{font-weight:600;font-size:13px}
.axis-insight{border-radius:16px;padding:18px 16px;margin-bottom:12px;line-height:1.65}
.axis-insight > strong{display:block;font-size:16px;margin-bottom:6px}
.axis-insight p{font-size:13.5px;color:var(--text-light);margin:4px 0 0}
.ch-insight{padding:22px 18px;border-radius:18px}

/* Food therapy section */
.food-rx{
  background:linear-gradient(135deg,#FDF9F0 0%,#F0F5EE 100%);
  border:1px solid rgba(180,168,130,0.2);border-radius:22px;
  padding:24px 18px;margin:16px 0;
  box-shadow:0 4px 20px rgba(74,61,51,0.04);
}
.food-rx .sec-icon{font-size:28px;text-align:center;margin-bottom:6px}
.food-rx .sec-title{text-align:center;font-size:15px;font-weight:700;letter-spacing:2px;margin-bottom:2px}
.food-rx .sec-sub{text-align:center;font-family:'Playfair Display',serif;font-size:11px;color:var(--text-muted);letter-spacing:2px;margin-bottom:14px}
.food-rx .sec-line{width:36px;height:1px;background:var(--border);margin:0 auto 16px}
.food-group{margin-bottom:16px}
.food-group-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.food-chip{
  display:flex;align-items:center;gap:8px;
  padding:10px 12px;background:white;border-radius:12px;
  border:1px solid rgba(229,221,211,.5);
  font-size:13px;line-height:1.4;
}
.food-chip .fc-name{font-weight:500}
.food-chip .fc-prop{font-size:10.5px;color:var(--text-muted);margin-top:1px}
.food-chip .fc-icon{font-size:20px;flex-shrink:0}
.food-avoid{
  display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;
}
.food-avoid-tag{
  padding:4px 10px;border-radius:8px;font-size:12px;
  background:#FDF0EE;color:#8A4A3A;border:1px solid rgba(191,117,101,0.15);
}
.food-season{margin-top:14px;padding:14px;background:rgba(255,255,255,0.7);border-radius:14px;border:1px solid rgba(229,221,211,.3)}
.food-season-title{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.food-season-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.food-season-item{font-size:12px;line-height:1.5;color:var(--text-light)}
.food-season-item strong{color:var(--text);font-weight:500}
.food-note{margin-top:14px;padding:12px 14px;background:rgba(122,142,118,0.06);border-radius:12px;font-size:12px;line-height:1.6;color:var(--text-light)}

/* ===== RESULT ===== */
.rp{animation:fadeUp .5s}
.r-head{text-align:center;padding:14px 0}
.r-name{font-size:22px;font-weight:700}
.r-label{font-family:'Playfair Display',serif;font-size:12px;color:var(--text-muted);margin-top:2px;letter-spacing:2px}

/* Chart card */
.chart-card{
  background:var(--card);backdrop-filter:blur(18px);
  border:1px solid rgba(229,221,211,.55);border-radius:22px;
  padding:22px 14px 18px;margin:16px 0;text-align:center;
  box-shadow:0 6px 28px var(--shadow);
}
.chart-card h3{font-size:12px;font-weight:400;color:var(--text-muted);letter-spacing:1.5px;margin-bottom:6px}
.chart-wrap{position:relative;width:300px;height:300px;margin:0 auto;padding:10px}

/* Cold-hot bar */
.ch-bar-wrap{margin:20px 14px 0;text-align:center}
.ch-bar-label{font-size:12px;color:var(--text-muted);margin-bottom:8px;letter-spacing:1px}
.ch-bar-outer{position:relative;height:28px;background:linear-gradient(to right,#B8D4E3,#E8E8E8,#E8C4B8);border-radius:14px;overflow:visible;margin:0 8px}
.ch-bar-marker{
  position:absolute;top:-4px;width:12px;height:36px;background:var(--text);
  border-radius:6px;transform:translateX(-50%);transition:left .8s;opacity:.7;
}
.ch-bar-labels{display:flex;justify-content:space-between;margin:6px 8px 0;font-size:11px;color:var(--text-muted)}

/* Signal cards */
.sig-card{
  background:var(--card);backdrop-filter:blur(18px);
  border:1px solid rgba(229,221,211,.55);border-radius:22px;
  padding:22px 20px;margin:16px 0;box-shadow:0 6px 28px var(--shadow);
}
.sec-title{font-size:15px;font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.sec-line{width:28px;height:1px;background:var(--border);margin:8px 0 12px}
.sig-row{display:flex;align-items:center;gap:10px;margin:8px 0;font-size:13px}
.sig-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sig-bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.sig-bar-fill{height:100%;border-radius:3px;transition:width 1.2s}
.sig-val{width:24px;font-size:11px;color:var(--text-muted);text-align:right}

/* Contradiction alert */
.warn-card{
  background:#FFF8F0;backdrop-filter:blur(18px);
  border:1.5px solid #E8C88A;border-radius:22px;
  padding:22px 20px;margin:16px 0;box-shadow:0 6px 28px rgba(196,136,58,.06);
}
.warn-icon{font-size:20px;margin-bottom:8px}
.warn-title{font-size:15px;font-weight:600;color:#8A6A2A;margin-bottom:4px}
.warn-line{width:28px;height:1px;background:#E8C88A;margin:8px 0 12px}
.warn-item{font-size:13px;line-height:1.8;color:#6A5020;margin:6px 0;padding-left:8px;border-left:2px solid #E8C88A}
.warn-note{font-size:12px;color:var(--text-muted);margin-top:14px;line-height:1.7;font-weight:300}

/* Summary card */
.summary-card{
  background:var(--card);backdrop-filter:blur(18px);
  border:1px solid rgba(229,221,211,.55);border-radius:22px;
  padding:22px 20px;margin:16px 0;box-shadow:0 6px 28px var(--shadow);
}
.summary-text{font-size:14px;line-height:1.9;font-weight:300;color:var(--text-light)}

/* Axis insight rows */
.axis-insight{margin:10px 0;padding:12px 14px;border-radius:14px;font-size:13px;line-height:1.7}
.axis-insight .ai-label{font-weight:600;margin-bottom:2px}
.axis-insight .ai-desc{font-weight:300;color:var(--text-light)}

/* CTA & tip */
.tip-card{
  background:var(--card);backdrop-filter:blur(18px);border:1px solid rgba(229,221,211,.55);
  border-radius:18px;padding:18px;margin:16px 0;font-size:13px;line-height:1.8;
  color:var(--text-light);font-weight:300;box-shadow:0 6px 28px var(--shadow);
}
.tip-card strong{color:var(--text);font-weight:500}
.cta-card{text-align:center;margin:18px 0 6px;padding:20px 18px;background:var(--card);backdrop-filter:blur(18px);border:1px solid rgba(229,221,211,.55);border-radius:18px;box-shadow:0 6px 28px var(--shadow)}
.cta-card p{font-size:13px;color:var(--text-light);margin-bottom:12px;line-height:1.7;font-weight:300}

.hidden{display:none!important}
.share-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px}
.share-overlay.hidden{display:none}
.share-modal{background:#fff;border-radius:18px;max-width:380px;width:100%;max-height:85vh;overflow-y:auto;padding:18px;text-align:center}
.share-hint{font-size:12px;color:var(--text-muted);margin-bottom:10px;line-height:1.6}
.share-card{background:#f9f7f3;border-radius:14px;padding:22px 18px;text-align:center}
.share-card .sc-title{font-size:15px;font-weight:600;color:var(--primary);letter-spacing:1px}
.share-card .sc-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.share-card .sc-divider{width:40px;height:1px;background:var(--border);margin:12px auto}
.share-card .sc-name{font-size:16px;font-weight:600;color:var(--text);margin:8px 0 4px}
.share-card .sc-pattern{display:inline-block;font-size:13px;padding:4px 14px;border-radius:20px;background:rgba(122,142,118,.12);color:var(--primary);font-weight:500;margin:6px 0}
.share-card .sc-desc{font-size:11.5px;color:var(--text-light);line-height:1.6;margin:8px 0;padding:0 6px}
.share-card .sc-footer{font-size:11px;color:var(--text-muted);margin-top:10px;line-height:1.5}
.share-img{width:100%;border-radius:12px}
.btn-row{display:flex;gap:8px;justify-content:center;margin-top:10px}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-blob bb1"></div><div class="bg-blob bb2"></div><div class="bg-blob bb3"></div>
</div>

<svg class="leaf-r" viewBox="0 0 100 260" fill="none">
  <g><path d="M50 8C65 30 78 55 72 85C85 70 92 90 88 115C78 108 74 120 68 140C80 135 85 155 78 175C68 165 62 178 58 195C68 190 72 210 64 230C55 220 50 232 48 248" stroke="#7A9970" stroke-width="1.2" fill="none" opacity=".5"/>
  <path d="M72 85C55 78 48 58 50 8" fill="#7A9970" opacity=".08"/>
  <path d="M50 8C35 30 22 55 28 85C15 70 8 90 12 115C22 108 26 120 32 140C20 135 15 155 22 175" stroke="#7A9970" stroke-width="1" fill="none" opacity=".35"/>
  </g>
</svg>

<div class="container">

<div class="header">
  <svg width="160" height="22" viewBox="0 0 160 22" fill="none">
    <text x="0" y="18" font-family="'Playfair Display', serif" font-size="20" font-weight="600" fill="#00553E" letter-spacing="3">ZODIAC PET</text>
  </svg>
  <h1>毛孩體質觀察指南</h1>
  <div class="sub">Constitution Observation Tool</div>
  <div class="brand">拾貳寵動物醫院 ✦ 中獸醫門診</div>
  <div class="h-line"></div>
</div>

<!-- INTRO -->
<div id="intro-page">
  <div class="intro">
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="30" fill="#E8F0E5" opacity=".5"/>
      <path d="M22 38c-2-6 0-12 4-16s10-5 15-2c4-4 10-3 13 2s2 12-2 15c3 5 1 11-3 14s-10 2-13-1c-5 4-11 3-14-1s-3-8 0-11z" fill="#7A9970" opacity=".18" stroke="#7A9970" stroke-width="1" opacity=".4"/>
      <circle cx="26" cy="30" r="2.5" fill="#1A2E1A" opacity=".5"/>
      <circle cx="38" cy="30" r="2.5" fill="#1A2E1A" opacity=".5"/>
      <path d="M29 37c1.5 2 3.5 3 5.5 0" stroke="#1A2E1A" stroke-width="1.2" stroke-linecap="round" fill="none" opacity=".4"/>
    </svg>
    <p>
      只要 <strong>14 個觀察題</strong>，就能幫你看見<br>
      毛孩目前的體質傾向和需要留意的地方<br>
    </p>
    <p style="font-size:12px;color:var(--text-muted)">
      ⚠️ 這個工具不是診斷，是觀察練習<br>最終體質判讀，請交給中獸醫師
    </p>
  </div>
  <div class="pet-section">
    <label>毛孩的名字</label>
    <input type="text" id="pet-name" class="pet-in" placeholder="例：阿財" style="margin-bottom:14px">
    <label>牠是⋯</label>
    <div class="sp-toggle" style="margin-top:7px">
      <button type="button" class="sp-btn active" id="sp-dog" onclick="setSp('dog')">🐕 狗狗</button>
      <button type="button" class="sp-btn" id="sp-cat" onclick="setSp('cat')">🐈 貓咪</button>
    </div>
  </div>
  <!-- Dog size (only shown for dogs) -->
  <div class="pet-section" id="size-section">
    <label>體型</label>
    <div class="size-toggle">

    b.classList.toggle('active', ['small','medium','large','giant'][i]===sz);
  });
  renderAgeBrackets();
}

function renderAgeBrackets() {
  const sizeKey = petSp === 'cat' ? 'default' : petSize;
  const brackets = AGE_BRACKETS[petSp][sizeKey];
  const container = document.getElementById('age-toggle');
  let html = '';
  const stages = ['young','adult','mature','senior'];
  stages.forEach(stage => {
    const [lo, hi] = brackets[stage];
    const rangeText = hi >= 99 ? `${lo}歲+` : `${lo}-${hi}歲`;
    const isActive = petAge === stage ? ' active' : '';
    html += `<button type="button" class="age-btn${isActive}" onclick="setAge('${stage}')">${AGE_LABELS[stage]}<br><span style="font-size:10px;color:var(--text-muted)">${rangeText}</span></button>`;
  });
  container.innerHTML = html;
}

function setAge(a) {
  petAge = a;
  renderAgeBrackets();
}

function updateTraits() {
  breedTraits.brachy = document.getElementById('trait-brachy').checked;

}

// ===== QUIZ ENGINE =====
function startQuiz() {
  petName = document.getElementById('pet-name').value.trim() || '毛孩';
  curQ = 0; answers = new Array(QS.length).fill(null);
  document.getElementById('intro-page').classList.add('hidden');
  document.getElementById('quiz-page').classList.remove('hidden');
  renderQ();
}

function renderQ() {
  const q = QS[curQ];
  const total = QS.length;
  const pct = ((curQ) / total * 100).toFixed(0);
  document.getElementById('p-text').textContent = `第 ${curQ+1} / ${total} 題`;
  const catNames = {e:'活力觀察',s:'體態觀察',m:'代謝觀察',l:'腹部觀察',t:'寒熱觀察'};
  document.getElementById('p-cat').textContent = catNames[q.cat] || '';
  document.getElementById('p-fill').style.width = pct + '%';

  const qText = (petSp==='cat' && q.qc) ? q.qc : q.q;
  const hintText = (petSp==='cat' && q.hintc) ? q.hintc : q.hint;
  const catCls = {e:'qc-e',s:'qc-s',m:'qc-m',l:'qc-l',t:'qc-t'}[q.cat];
  const catLabel = catNames[q.cat];

  let opts;
  if (q.opts_dog && q.opts_cat) {
    opts = petSp === 'cat' ? q.opts_cat : q.opts_dog;
  } else {
    opts = q.opts;
  }

  let html = `<div class="card">
    <div class="q-num">Question ${curQ+1}</div>
    <span class="q-cat ${catCls}">${catLabel}</span>
    <div class="q-text">${qText}</div>
    <div class="q-hint">${hintText}</div>
    <div class="opts">`;

  opts.forEach((o, i) => {
    const sel = answers[curQ] === i ? ' on' : '';
    html += `<button class="opt${sel}" onclick="pickOpt(${i})">
      <span class="ck"></span><span>${o.t}</span>
    </button>`;
  });

  html += `</div>`;
  html += `<div class="btn-row">`;
  if (curQ > 0) html += `<button class="btn bs" onclick="prevQ()">← 上一題</button>`;
  if (curQ < total - 1) {
    html += `<button class="btn bp" id="next-btn" onclick="nextQ()" ${answers[curQ]===null?'disabled':''}>下一題 →</button>`;
  } else {
    html += `<button class="btn bp" id="next-btn" onclick="showResult()" ${answers[curQ]===null?'disabled':''}>看結果</button>`;
  }
  html += `</div></div>`;
  document.getElementById('q-area').innerHTML = html;
}

function pickOpt(i) {
  answers[curQ] = i;
  // Toggle .on class without full re-render to prevent flicker
  const optBtns = document.querySelectorAll('#q-area .opts .opt');
  optBtns.forEach((btn, idx) => {
    btn.classList.toggle('on', idx === i);
  });
  // Enable next/result button
  const nb = document.getElementById('next-btn');
  if (nb) nb.disabled = false;
}
function nextQ() { if (answers[curQ] !== null) { curQ++; renderQ(); } }
function prevQ() { curQ--; renderQ(); }

// ===== SCORING ENGINE =====
function calcScores() {
  // Accumulate raw signals
  let raw = {e:0, s:0, m:0, l:0, ch:0};
  let counts = {e:0, s:0, m:0, l:0, ch:0};
  let wu = [0,0,0,0,0]; // hidden five-element
  let contradictions = [];
  let abdFlags = []; // abdominal observation flags

  QS.forEach((q, qi) => {
    if (answers[qi] === null) return;
    let opts;
    if (q.opts_dog && q.opts_cat) {
      opts = petSp === 'cat' ? q.opts_cat : q.opts_dog;
    } else {
      opts = q.opts;
    }
    const chosen = opts[answers[qi]];
    if (!chosen) return;
    const sc = chosen.s;

    // Accumulate axis scores
    ['e','s','m','l','ch'].forEach(k => {
      if (sc[k] !== 0) { raw[k] += sc[k]; counts[k]++; }
    });

    // Five element hidden accumulation
    if (chosen.wu) chosen.wu.forEach((v,i) => wu[i] += v);

    // Contradiction detection
    if (chosen._contradiction) contradictions.push(chosen._contradiction);
    // Abdominal flags
    if (chosen._flag) abdFlags.push(chosen._flag);
  });

  // === Age modifier (AAHA-based, species + size aware) ===
  let ageMod = {e:0, s:0, m:0, l:0, ch:0};
  if (petAge === 'young') {
    ageMod.e = 1;       // young animals naturally more energetic
    ageMod.l = -0.3;    // young bodies tend lighter/less accumulated
  } else if (petAge === 'mature') {
    ageMod.e = -0.3;    // subtle energy decline
    ageMod.m = -0.2;    // metabolism starts slowing
  } else if (petAge === 'senior') {
    ageMod.e = -0.8;    // energy clearly declining
    ageMod.s = -0.5;    // substance/nourishment depleting
    ageMod.m = -0.4;    // metabolism slowing
    ageMod.l = 0.3;     // more prone to accumulation
    ageMod.ch = -0.5;   // tendency toward cold
  }
  // Giant breeds age faster — amplify senior effects
  if (petSp === 'dog' && petSize === 'giant' && (petAge === 'mature' || petAge === 'senior')) {
    ageMod.e -= 0.2;
    ageMod.s -= 0.2;
  }

  // === Breed trait modifiers ===
  let breedMod = {e:0, s:0, m:0, l:0, ch:0};
  if (breedTraits.brachy) {
    breedMod.ch = 0.8;  // brachycephalic = harder to dissipate heat → shifts hot
    breedMod.m = -0.3;  // respiratory inefficiency affects metabolism
  }
  if (breedTraits.thickCoat) {
    breedMod.ch = (breedMod.ch || 0) + 0.4; // thick coat traps heat
  }

  // Normalize to 0-5 scale
  const energy = Math.max(0, Math.min(5, 2.5 + (raw.e + ageMod.e) * 0.35));
  const bodyCondition = Math.max(0, Math.min(5, 2.5 + (raw.s + ageMod.s) * 0.42));
  const metabolism = Math.max(0, Math.min(5, 2.5 + (raw.m + ageMod.m + breedMod.m) * 0.42));
  // 腹部負擔: high = more accumulation/burden (direct direction)
  const accumulation = Math.max(0, Math.min(5, 2.5 + (raw.l + ageMod.l) * 0.38));
  // Cold-Hot with breed modifier
  const coldHot = Math.max(-5, Math.min(5, (raw.ch + breedMod.ch) * 0.7));

  // Cross-check contradictions
  if (coldHot > 1 && energy < 2) contradictions.push('R4');
  if (raw.l > 2 && raw.ch < -1) contradictions.push('R5');

  // Remove duplicates
  contradictions = [...new Set(contradictions)];

  // Signal counts for display
  const yangXuCount = (raw.e < 0 ? Math.abs(Math.round(raw.e)) : 0) + (raw.ch < -1 ? 1 : 0);
  const yinXuCount = (raw.s < 0 ? Math.abs(Math.round(raw.s)) : 0) + (raw.ch > 1 ? 1 : 0);
  const excessCount = (raw.l > 1 ? Math.round(raw.l) : 0);
  const balancedCount = Math.max(0, 12 - yangXuCount - yinXuCount - excessCount);

  return {
    energy, bodyCondition, metabolism, accumulation, coldHot,
    contradictions, abdFlags,
    signals: { yangXu: yangXuCount, yinXu: yinXuCount, excess: excessCount, balanced: balancedCount },
    wu, raw
  };
}

      <span style="color:var(--text-main)">◆ 李文瑞《傷寒派腹診》＋《腹証奇覽》</span>— 腹部觀察題的理論來源<br>
      <span style="color:var(--text-main)">◆ 劉建和《肉食療法》</span>— 食療建議的性味歸經與配伍依據<br>
      <span style="color:var(--text-main)">◆ 徐文兵《講美食課》</span>— 食材三分法、芳香化濕、節氣飲食理論<br>
      <span style="color:var(--text-main)">◆ 拾貳寵動物醫院臨床經驗</span>— 數百例中獸醫門診的實戰校準
    </div>
  </div>`;

  // ====== DISCLAIMER ======
  html += `<div class="tip-card" style="background:#faf9f6;border:1px solid #e8e4dc">
    <div style="font-size:13px;font-weight:600;color:var(--primary);margin-bottom:6px">🤝 溫馨提醒</div>
    <div style="font-size:12.5px;line-height:1.8;color:var(--text-light)">
      這份結果是根據你的居家觀察產出的「<strong>體質傾向參考</strong>」，幫助你在日常飲食與照護上多一份方向感。<br><br>
      真正的體質判讀，需要中獸醫師透過<strong>問診、望診、觸診、脈診</strong>等綜合評估才能確立。每隻毛孩的狀況都是獨特的，醫師會根據實際情況做出最適合的判斷。<br><br>
      如果 ${petName} 有正在治療的疾病、反覆出現的健康問題、或持續不適的症狀，建議搭配中獸醫師的實際診療，效果會更完整喔。<br><br>
      你可以把這份觀察紀錄想成是「<strong>多了一份參考資料</strong>」——帶著它去看診，能幫助醫師更快了解 ${petName} 在家的狀態，讓溝通更順暢。<br><br>
      <span style="font-size:11.5px;color:var(--text-muted)">本工具僅供居家觀察參考，不能取代專業診斷與治療。</span>
    </div>
  </div>`;

  // CTA — share + brand redirect
  html += `<div class="cta-card">
    <p>覺得這份結果有參考價值嗎？<br>分享給同樣關心毛孩健康的朋友吧 🐾</p>
    <div class="btn-row">
      <button class="btn bp" onclick="genShareCard()">分享結果</button>
      <button class="btn bs" onclick="location.reload()">再測一次</button>
    </div>
  </div>`;

  // Brand redirect
  html += `<div style="text-align:center;margin:14px 0 4px">
    <p style="font-size:12.5px;color:var(--text-light);line-height:1.7;margin-bottom:10px">
      想知道怎麼用「吃」來照顧毛孩體質？<br>
      <span style="color:var(--primary);font-weight:500">五色蔬菜磚</span>——根據中獸醫食療邏輯設計的鮮食配方
    </p>
    <a href="#" onclick="alert('品牌頁面連結即將上線');return false" style="display:inline-block;font-size:13px;color:var(--primary);font-weight:500;text-decoration:none;padding:8px 20px;border:1px solid var(--primary);border-radius:24px;transition:all .2s">了解五色蔬菜磚 →</a>
  </div>`;

  html += `</div>`; // rp end

  document.getElementById('result-page').innerHTML = html;

  // Draw radar chart
  setTimeout(() => drawRadar(sc), 100);
}

function drawRadar(sc) {
  const ctx = document.getElementById('radar-chart');
  if (!ctx) return;

  new Chart(ctx, {
    type: 'radar',
    data: {
      labels: [['活力','Vitality'], ['體態','Body'], ['代謝','Metabolism'], ['腹部','Abdomen']],
      datasets: [{
        data: [sc.energy, sc.bodyCondition, sc.metabolism, sc.accumulation],
        backgroundColor: 'rgba(122,142,118,0.12)',
        borderColor: 'rgba(122,142,118,0.6)',
        borderWidth: 2,
        pointBackgroundColor: [
          'var(--ax-vitality)', 'var(--ax-body)', 'var(--ax-metabolism)', 'var(--ax-accum)'
        ],
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: 6,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 5,
          ticks: { stepSize: 1, display: false },
          grid: { color: 'rgba(0,0,0,0.06)' },
          angleLines: { color: 'rgba(0,0,0,0.06)' },
          pointLabels: {
            font: { family: "'Noto Sans TC', sans-serif", size: 12, weight: '500' },
            color: '#4A5F4A',
          }
        }
      }
    }
  });
}

// ===== SHARE CARD =====
function genShareCard() {
  const wrap = document.getElementById('share-img-wrap');
  const sp = petSp === 'cat' ? '🐱' : '🐶';
  wrap.innerHTML = `
    <div class="share-card" id="share-card-el">
      <div class="sc-title">毛孩體質觀察報告</div>
      <div class="sc-sub">Constitution Observation Report</div>
      <div class="sc-divider"></div>
      <div class="sc-name">${sp} ${petName}</div>
      <div class="sc-pattern">${lastPattern || '體質觀察'}</div>
      <div class="sc-desc">這份報告根據居家觀察產出，提供日常飲食與照護的參考方向。</div>
      <div class="sc-divider"></div>
      <div class="sc-footer">
        <strong>想知道怎麼用「吃」來照顧毛孩體質？</strong><br>
        五色蔬菜磚——根據中獸醫食療邏輯設計的鮮食配方 🐾
      </div>
    </div>
  `;

  document.getElementById('share-overlay').classList.remove('hidden');

  // Convert to image
  setTimeout(() => {
    const el = document.getElementById('share-card-el');
    html2canvas(el, {
      backgroundColor: '#f9f7f3',
      scale: 2,
      useCORS: true,
      logging: false
    }).then(canvas => {
      const img = canvas.toDataURL('image/png');
      shareData = { img, pattern: lastPattern, name: petName };
      wrap.innerHTML = `<img src="${img}" class="share-img" alt="${petName} 體質觀察結果">`;
    }).catch(() => {});
  }, 200);
}

function closeShare(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('share-overlay').classList.add('hidden');
}

async function doNativeShare() {
  if (shareData.img && navigator.share) {
    try {
      const resp = await fetch(shareData.img);
      const blob = await resp.blob();
      const file = new File([blob], `${shareData.name}_體質觀察.png`, { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          title: `${shareData.name} 的體質觀察結果`,
          text: `${shareData.name} 的體質傾向是「${shareData.pattern}」！快來幫你家毛孩做觀察 🐾`,
          files: [file]
        });
        return;
      }
    } catch (e) { if (e.name === 'AbortError') return; }
    try {
      await navigator.share({
        title: `${shareData.name} 的體質觀察結果`,
        text: `${shareData.name} 的體質傾向是「${shareData.pattern}」！快來幫你家毛孩做觀察 🐾`
      });
      return;
    } catch (e) { if (e.name === 'AbortError') return; }
  }
  // Fallback: download
  const isInApp = /Line|FBAN|FBAV|Instagram/i.test(navigator.userAgent || '');
  if (!isInApp && shareData.img) {
    try {
      const a = document.createElement('a');
      a.href = shareData.img;
      a.download = `${petName}_體質觀察.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      return;
    } catch (e) {}
  }
  alert('長按圖片即可儲存到手機相簿，再分享給朋友喔！');
}
</script>
